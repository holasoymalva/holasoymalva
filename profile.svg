<svg xmlns="http://www.w3.org/2000/svg" width="1049" height="478" viewBox="0 0 1049 478">
  <style>
    .terminal {
      fill: #0d0d0d;
      stroke: #00ff66;
      stroke-width: 1.5;
      rx: 12px;
    }
    .text-base {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13.5px;
      line-height: 16px;
    }
    .ascii-text {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 8px;
      fill: #ffffff;
      letter-spacing: 0px;
    }
    .title { fill: #00ff66; font-weight: bold; }
    .key { fill: #00ff66; }
    .val { fill: #ffffff; }
    .decor { fill: #008833; }
    .bullet { fill: #008833; }
  </style>

  <!-- Background Card -->
  <rect class="terminal" width="1039" height="468" x="5" y="5" />

