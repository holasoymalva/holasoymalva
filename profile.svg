<svg xmlns="http://www.w3.org/2000/svg" width="989" height="444" viewBox="0 0 989 444">
  <style>
    .terminal {
      fill: #1e1e24;
      stroke: #61afef;
      stroke-width: 1.5;
      rx: 12px;
    }
    .text-base {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13.5px;
      line-height: 16px;
    }
    .ascii-text {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 8px;
      fill: #abb2bf;
      letter-spacing: 0px;
    }
    .title { fill: #e06c75; font-weight: bold; }
    .key { fill: #d19a66; }
    .val { fill: #abb2bf; }
    .decor { fill: #5c6370; }
    .bullet { fill: #5c6370; }
  </style>

  <!-- Background Card -->
